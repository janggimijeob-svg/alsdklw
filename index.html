<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>연결 중입니다...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; background:#000;">

    <script>
        window.onload = function() {
            // ★ 여기에 사장님 link24 변환 링크 넣으세요
            var myLink = "https://link24.kr/A47Mwq2"; 
            
            // 1. 앱 강제 실행 시도 (인텐트 방식)
            var intent = "intent://lite#Intent;scheme=snssdk473824;package=com.zhiliaoapp.musically.go;S.browser_fallback_url=" + encodeURIComponent(myLink) + ";end";
            
            location.href = intent;

            // 2. 혹시나 브라우저가 멍청하게 가만히 있으면 0.1초 뒤에 사장님 링크로 강제 이동
            setTimeout(function() {
                window.location.replace(myLink);
            }, 100);
        };
    </script>

    <div style="width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; color:#fff; font-family:sans-serif;">
        <p>잠시 후 앱으로 연결됩니다...</p>
    </div>
</body>
</html>
