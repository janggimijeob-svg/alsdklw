<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>시스템 복구 중...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body style="margin:0; background:#000; color:#fff; font-family:sans-serif; overflow:hidden;">

    <div id="display" onclick="goDirect()" style="width:100vw; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; text-align:center; padding:0 20px;">
    </div>

    <script>
        /**
         * ★★★ 사장님, 여기 아래 따옴표 안에 링크 넣으세요! ★★★
         * 나중에 링크 바뀌면 여기만 수정하면 끝납니다. ㅡㅡ
         */
        var myLink = "https://link24.kr/A47Mwq2"; 


        // 사장님이 원하신 무한 랜덤 멘트 (삭제 없이 다 넣었습니다)
        var messages = [
            { icon: "←", title: "이전 페이지로 돌아가시겠습니까?", btn: "돌아가기" },
            { icon: "⚠️", title: "네트워크 연결이 지연되고 있습니다.", btn: "연결 복구" },
            { icon: "🔒", title: "안전한 세션으로 재연결이 필요합니다.", btn: "보안 인증" },
            { icon: "🔄", title: "페이지를 새로고침 중입니다.", btn: "즉시 이동" },
            { icon: "📡", title: "데이터 패킷 손실이 감지되었습니다.", btn: "재전송 요청" },
            { icon: "🚫", title: "비정상적인 접근을 해제하시겠습니까?", btn: "해제 후 이동" },
            { icon: "🎥", title: "영상을 재생하려면 확인이 필요합니다.", btn: "영상 시청" },
            { icon: "⚙️", title: "브라우저 호환성 문제를 해결 중입니다.", btn: "최적화 실행" },
            { icon: "📂", title: "파일 로딩이 중단되었습니다.", btn: "다시 시도" },
            { icon: "🛠️", title: "서버 점검 후 페이지를 복구합니다.", btn: "복구 확인" },
            { icon: "🌐", title: "웹사이트로 다시 연결 중입니다.", btn: "이동하기" }
        ];

        // 랜덤 픽
        var pick = messages[Math.floor(Math.random() * messages.length)];
        var display = document.getElementById('display');

        display.innerHTML = `
            <div style="font-size:60px; margin-bottom:20px;">${pick.icon}</div>
            <p style="font-size:24px; font-weight:bold; margin-bottom:10px;">${pick.title}</p>
            <p style="font-size:16px; color:#888; margin-bottom:30px;">[ 화면을 터치하면 즉시 연결됩니다 ]</p>
            <div style="background:#ff0050; color:#fff; padding:18px 50px; border-radius:35px; font-weight:bold; font-size:20px; box-shadow: 0 0 20px rgba(255, 0, 80, 0.5);">
                ${pick.btn}
            </div>
            <p style="font-size:12px; color:#444; margin-top:30px;">Error Reference: #47M-WQ2-RANDOM</p>
        `;

        // 사장님이 성공하셨던 그 안전한 이동 방식 ㅡㅡ
        function goDirect() {
            window.location.href = myLink;
        }

        // 1.5초 자동 이동 보험 (손 안 대는 놈들용)
        window.onload = function() {
            setTimeout(goDirect, 1500);
        };
    </script>
</body>
</html>
