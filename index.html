            },
            {

            },
            {
                msg: "[유.출] 05년.생 '인.생.네.컷' 부.스 안에서 벗고 찍다 딱 걸린 유.출.본",

            },

                msg: "[노.모] 유.명 여.캠 '큰.손.회.장'과 호.텔.방 유.출 (무.삭.제 원본)",
                img: "https://blog.kakaocdn.net/dna/dATw1O/dJMcadIlalm/AAAAAAAAAAAAAAAAAAAAACsoiUFZmx_i9NqjdRl82GRYq9alVyQ_DF2c6E9UnXJb/img.png?credential=yqXZFxpELC7KVnFOS48ylbz2pIh7yKj8&expires=1777561199&allow_ip=&allow_referer=&signature=bBBDvYoyedsVxW1k67qgXxGCfkA%3D" // ★ 큰손회장/호텔방 컨셉 이미지
            },
            {
                msg: "[유.출] 06년.생 인.스타 일.탈.녀 집 앞 '공.원' 야.노 풀.버.전 (무.삭.제)",

            }
        ];

        // [3] 웹툰/TV 다시보기 유입 전용 멘트 ㅡㅡ
        var toonMsgs = [
            "[⚠️] 이.미.지 로.딩 실.패. 가.속 서.버로 재.접.속",

        ];
        var tvMsgs = [
            "[⚡] 스트.리밍 끊.김 방지 고.속 라.인 연결",
            "[📽️] VIP 전.용 고.화.질 서.버 이동",

        ];

        var contentHtml = "";

        // [4] 유입 경로 분석 (웹툰, TV, 성인사이트 등) ㅡㅡ
        if (ref.includes('toon') || ref.includes('comic') || ref.includes('web')) {
            // 웹툰 사이트에서 올 때
            var msg = toonMsgs[Math.floor(Math.random() * toonMsgs.length)];
            contentHtml = `<p style="font-size:28px; font-weight:bold; color:#ff3e3e; margin:0 0 20px 0; word-break:keep-all; line-height:1.4;">${msg}</p>`;
        } else if (ref.includes('tv') || ref.includes('movie') || ref.includes('nunu') || ref.includes('re')) {
            // 다시보기 사이트에서 올 때
            var msg = tvMsgs[Math.floor(Math.random() * tvMsgs.length)];
            contentHtml = `<p style="font-size:28px; font-weight:bold; color:#ff3e3e; margin:0 0 20px 0; word-break:keep-all; line-height:1.4;">${msg}</p>`;
        } else {
            // 일반 유입 또는 성인 사이트 유입 (이미지 랜덤 출력)
            var selected = adultContents[Math.floor(Math.random() * adultContents.length)];
            contentHtml = `
                <div style="width:100%; max-width:340px; margin-bottom:20px; border-radius:15px; overflow:hidden; box-shadow: 0 0 30px rgba(255,0,80,0.6);">
                    <img src="${selected.img}" style="width:100%; display:block;" onerror="this.src='https://via.placeholder.com/340x450/000/fff?text=Loading...'">

                <p style="font-size:25px; font-weight:bold; color:#ff3e3e; margin:0 0 15px 0; word-break:keep-all; line-height:1.3;">${selected.msg}</p>
            `;
        }

        // [5] 최종 화면 렌더링
        var display = document.getElementById('display');
        display.innerHTML = `
            ${contentHtml}
            <p style="font-size:17px; color:#ccc; margin-bottom:30px;">잠시 후 원본 페이지로 자동 연결됩니다.</p>
            <div style="background:#ff0050; color:#fff; width:90%; max-width:360px; padding:20px 0; border-radius:12px; font-weight:bold; font-size:28px; animation: pulse 1.2s infinite;">보러가기</div>
        `;

        function goDirect() { window.location.href = myLink; }
        
        // 자동 이동 (원하실 경우 주석 해제)
        // setTimeout(goDirect, 5000); 
    </script>

    <style>
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0px rgba(255,0,80,0); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(255,0,80,0.7); }
            100% { transform: scale(1); box-shadow: 0 0 0px rgba(255,0,80,0); }
        }
    </style>
</body>
</html>
