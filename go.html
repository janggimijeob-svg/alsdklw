<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연결 중...</title>
    <script type="text/javascript">
        function launchApp() {
            // 본인 코드만 정확히 입력 (예: ZSN123456)
            var myCode = "https://link24.kr/DaQcDmg"; 
            var pkg = "com.zhiliaoapp.musically.go";
            
            // 튕김 방지를 위한 인텐트 주소 (S.browser_fallback_url을 '아무것도 안 함'으로 설정)
            var intentUrl = "intent://lite.tiktok.com/t/" + myCode + "/#Intent;scheme=https;package=" + pkg + ";S.browser_fallback_url=javascript:void(0);end";

            // 실행 시도 1
            location.href = intentUrl;

            // 0.5초 뒤 한 번 더 강제 호출 (브라우저 깨우기)
            setTimeout(function() {
                location.replace(intentUrl);
            }, 500);
        }

        window.onload = launchApp;
    </script>
</head>
<body style="background-color: #f4f4f4; text-align: center; padding-top: 100px; font-family: sans-serif;">
    <h3>어플로 연결 중입니다...</h3>
    <p>화면이 멈춰있다면 아래 버튼을 눌러주세요.</p>
    <button onclick="launchApp()" style="padding: 15px 30px; font-size: 18px; border-radius: 10px; background: #000; color: #fff; border: none; cursor: pointer;">
        어플 바로 열기
    </button>
</body>
</html>
